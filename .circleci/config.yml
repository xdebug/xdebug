version: 2.1
commands:
  compile:
    description: Compiles and sets-up common environment vars
    steps:
      - checkout
      - run: ./.build.scripts/compile.sh
      - run:
          name: Setup env vars
          command: |
            echo 'export CWD=`eval echo "${CIRCLE_WORKING_DIRECTORY}"`' >> $BASH_ENV
  compile-no-zlib:
    description: Compiles and sets-up common environment vars
    steps:
      - checkout
      - run: ./.build.scripts/compile.sh --without-xdebug-compression
      - run:
          name: Setup env vars
          command: |
            echo 'export CWD=`eval echo "${CIRCLE_WORKING_DIRECTORY}"`' >> $BASH_ENV
  run-tests:
    description: Runs the tests
    steps:
      - run:
          name: Run tests with env vars
          command: php run-xdebug-tests.php -j8 -q -x --show-diff

jobs:
  "PHP 8 3 without opcache":
    docker:
      - image: cimg/php:8.3.12
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PW
    steps:
      - checkout
      - compile
      - run:
          name: Setup extra env vars
          command: |
            echo 'export TEST_PHP_ARGS="-n -d foo=yes -d zend_extension=${CWD}/modules/xdebug.so"' >> $BASH_ENV
      - run-tests
    environment:
      REPORT_EXIT_STATUS: 1

  "PHP 8 3 with opcache":
    docker:
      - image: cimg/php:8.3.12
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PW
    steps:
      - checkout
      - compile
      - run:
          name: Setup extra env vars
          command: |
            echo 'export TEST_PHP_ARGS="-n -d foo=yes -d zend_extension=opcache.so -d opcache.enable=1 -d opcache.enable_cli=1 -d zend_extension=${CWD}/modules/xdebug.so"' >> $BASH_ENV
      - run-tests
    environment:
      REPORT_EXIT_STATUS: 1

  "PHP 8 2 without opcache":
    docker:
      - image: cimg/php:8.2.24
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PW
    steps:
      - checkout
      - compile-no-zlib
      - run:
          name: Setup extra env vars
          command: |
            echo 'export TEST_PHP_ARGS="-n -d foo=yes -d zend_extension=${CWD}/modules/xdebug.so"' >> $BASH_ENV
      - run-tests
    environment:
      REPORT_EXIT_STATUS: 1

  "PHP 8 2 with opcache":
    docker:
      - image: cimg/php:8.2.24
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PW
    steps:
      - checkout
      - compile
      - run:
          name: Setup extra env vars
          command: |
            echo 'export TEST_PHP_ARGS="-n -d foo=yes -d zend_extension=opcache.so -d opcache.enable=1 -d opcache.enable_cli=1 -d zend_extension=${CWD}/modules/xdebug.so"' >> $BASH_ENV
      - run-tests
    environment:
      REPORT_EXIT_STATUS: 1

  "PHP 8 1 without opcache":
    docker:
      - image: cimg/php:8.1.30
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PW
    steps:
      - checkout
      - compile
      - run:
          name: Setup extra env vars
          command: |
            echo 'export TEST_PHP_ARGS="-n -d foo=yes -d zend_extension=${CWD}/modules/xdebug.so"' >> $BASH_ENV
      - run-tests
    environment:
      REPORT_EXIT_STATUS: 1

  "PHP 8 1 with opcache":
    docker:
      - image: cimg/php:8.1.30
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PW
    steps:
      - checkout
      - compile
      - run:
          name: Setup extra env vars
          command: |
            echo 'export TEST_PHP_ARGS="-n -d foo=yes -d zend_extension=opcache.so -d opcache.enable=1 -d opcache.enable_cli=1 -d zend_extension=${CWD}/modules/xdebug.so"' >> $BASH_ENV
      - run-tests
    environment:
      REPORT_EXIT_STATUS: 1

  "PHP 8 0 without opcache":
    docker:
      - image: cimg/php:8.0.30
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PW
    steps:
      - checkout
      - compile
      - run:
          name: Setup extra env vars
          command: |
            echo 'export TEST_PHP_ARGS="-n -d foo=yes -d zend_extension=${CWD}/modules/xdebug.so"' >> $BASH_ENV
      - run-tests
    environment:
      REPORT_EXIT_STATUS: 1

  "PHP 8 0 with opcache":
    docker:
      - image: cimg/php:8.0.30
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PW
    steps:
      - checkout
      - compile
      - run:
          name: Setup extra env vars
          command: |
            echo 'export TEST_PHP_ARGS="-n -d foo=yes -d zend_extension=opcache.so -d opcache.enable=1 -d opcache.enable_cli=1 -d zend_extension=${CWD}/modules/xdebug.so"' >> $BASH_ENV
      - run-tests
    environment:
      REPORT_EXIT_STATUS: 1

  "PHP 8 3 debug":
    docker:
      - image: ubuntu:22.04
    steps:
      - run:
          name: Install build dependencies
          command: |
            apt-get update -y
            apt-get install -y \
              autoconf bison build-essential pkg-config \
              libsqlite3-dev libonig-dev re2c wget
      - run:
          name: Build PHP 8.3 with --enable-debug
          command: |
            cd /tmp
            wget -q https://www.php.net/distributions/php-8.3.0.tar.bz2
            tar xjf php-8.3.0.tar.bz2
            cd php-8.3.0
            ./buildconf --force
            ./configure \
              --enable-debug \
              --without-pear \
              --without-pdo-sqlite \
              --disable-dom \
              --disable-simplexml \
              --disable-xml \
              --disable-xmlreader \
              --disable-xmlwriter \
              --without-libxml \
              --enable-mbstring \
              --disable-mbregex \
              --enable-bcmath \
              --enable-zend-test
            make -j$(nproc)
            make install
      - checkout
      - run:
          name: Compile Xdebug
          command: |
            phpize
            ./configure
            make -j$(nproc)
            make install
            echo 'export CWD=`eval echo "${CIRCLE_WORKING_DIRECTORY}"`' >> $BASH_ENV
      - run:
          name: Run tests
          command: |
            export TEST_PHP_ARGS="-n -d foo=yes -d zend_extension=${CWD}/modules/xdebug.so"
            export REPORT_EXIT_STATUS=1
            php run-xdebug-tests.php -q -x --show-diff

workflows:
  version: 2
  testing:
    jobs:
      - "PHP 8 3 debug"
      - "PHP 8 3 without opcache"
      - "PHP 8 3 with opcache"
      - "PHP 8 2 without opcache"
      - "PHP 8 2 with opcache"
      - "PHP 8 1 without opcache"
      - "PHP 8 1 with opcache"
      - "PHP 8 0 without opcache"
      - "PHP 8 0 with opcache"
